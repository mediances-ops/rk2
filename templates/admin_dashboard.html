<!-- DOC-OS VERSION : V.68 SUPRÊME MISSION CONTROL -->
<!-- ADMIN DASHBOARD - HARMONIZED CHAT -->

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre-scouting Platform | Cockpit</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* [STYLES DASHBOARD V.66.1 MAINTENUS] */
        :root { --primary: #2C3E50; --secondary: #E67E22; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        /* SHARED HARMONIZED CHAT CSS */
        #adminChatPanel { 
            position: fixed; right: -520px; top: 0; width: 500px; height: 100vh; 
            background: var(--glass); backdrop-filter: blur(25px); 
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); z-index: 20000; 
            display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.4);
        }
        #adminChatPanel.active { right: 0; }
        .chat-header { background: var(--primary); color: white; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; background: transparent; }
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-me { align-self: flex-end; align-items: flex-end; } /* Admin is ME here */
        .msg-them { align-self: flex-start; align-items: flex-start; } /* Fixer is THEM here */
        
        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 0.95rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .msg-me .bubble { background: #EBF5FB; color: #2C3E50; border-bottom-right-radius: 4px; } /* Blue Pastel */
        .msg-them .bubble { background: #FDF2E9; color: #2C3E50; border-bottom-left-radius: 4px; } /* Orange Pastel */
        
        .msg-meta { font-size: 0.75rem; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .color-fixer { color: var(--secondary); }
        .color-production { color: var(--primary); }
        
        .msg-time { font-size: 0.65rem; opacity: 0.5; margin-top: 5px; text-align: right; font-weight: 800; }
        .day-separator { text-align: center; margin: 20px 0; border-bottom: 1px solid rgba(0,0,0,0.05); line-height: 0.1em; }
        .day-separator span { background: #f3f4f6; padding: 0 15px; color: #95a5a6; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        .chat-input-zone { padding: 30px; background: rgba(255,255,255,0.5); border-top: 2px solid rgba(0,0,0,0.05); display: flex; gap: 15px; }
        #adminChatInput { flex: 1; border: 2px solid #eef2f7; border-radius: 15px; padding: 15px; height: 100px; font-family: inherit; font-weight: 600; resize: none; background: white; outline: none; }
        .chat-send-btn { background: var(--secondary); color: white; border: none; border-radius: 15px; width: 60px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }

        /* [REST OF DASHBOARD V.66.1 STYLES] */
        .progress-mini-bar { width: 100px; background: #eee; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-mini-fill { height: 100%; background: #27ae60; }
        .chat-notif { background: #e74c3c; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <!-- [STRUCTURE DASHBOARD V.66.1 IDENTIQUE] -->
    <div class="container">
        <!-- ... [Header / Stats / Table] ... -->
        <div class="table-container">
            <table>
                <thead><tr><th>ID</th><th>Région / Progress</th><th>Fixer / Notifications</th><th>Statut</th><th>Actions</th></tr></thead>
                <tbody>
                    {% for item in reperages %}
                    {% set rep = item.reperage %}
                    <tr>
                        <td>#{{ rep.id }}</td>
                        <td><strong>{{ rep.region }}</strong><br><small>{{ rep.pays }}</small><div class="progress-mini-bar"><div class="progress-mini-fill" style="width: {{ rep.progression_pourcent }}%;"></div></div></td>
                        <td>{{ rep.fixer_nom }}{% if item.unread_count > 0 %}<span class="chat-notif" onclick="openAdminChat({{ rep.id }})">✉️ {{ item.unread_count }} NEW</span>{% else %}<button onclick="openAdminChat({{ rep.id }})" style="background:none; border:none; color:#3498db; cursor:pointer;"><i data-lucide="message-square" style="width:16px;"></i></button>{% endif %}</td>
                        <!-- ... [Actions] ... -->
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <!-- HARMONIZED CHAT PANEL -->
    <div id="adminChatPanel">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:12px; height:12px; background:#2ecc71; border-radius:50%; box-shadow:0 0 10px #2ecc71;"></div>
                <h3 style="font-weight:900; margin:0; font-size:1.3rem;">INSTANT MESSAGING</h3>
            </div>
            <button onclick="closeAdminChat()" style="background:none; border:none; color:white; font-size:2.5rem; cursor:pointer;">&times;</button>
        </div>
        <div id="adminChatMessages" class="chat-messages"></div>
        <div class="chat-input-zone">
            <textarea id="adminChatInput" placeholder="Répondre au correspondant..."></textarea>
            <button onclick="sendAdminMessage()" class="chat-send-btn"><i data-lucide="send" style="width:25px;"></i></button>
        </div>
    </div>

    <script>
        // Mêmes fonctions JS de V.66.1 mais pointant sur les nouveaux IDs
        const CONTEXT_TYPE = 'production';
        let currentChatId = null;
        function openAdminChat(id) { 
            currentChatId = id; 
            window.currentReperageId = id; // Bridge pour loadMessages
            document.getElementById('adminChatPanel').classList.add('active'); 
            loadAdminMessages(); 
        }
        function closeAdminChat() { document.getElementById('adminChatPanel').classList.remove('active'); }
        async function loadAdminMessages() {
            const res = await fetch(`/api/reperages/${currentReperageId}/messages?role=admin`);
            const msgs = await res.json();
            const container = document.getElementById('adminChatMessages');
            let html = ''; let lastDate = null;
            msgs.forEach(m => {
                const d = new Date(m.created_at);
                const ds = d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'short' });
                if (ds !== lastDate) { html += `<div class="day-separator"><span>${ds}</span></div>`; lastDate = ds; }
                const isMe = m.auteur_type === 'production';
                html += `<div class="msg-wrapper ${isMe ? 'msg-me' : 'msg-them'}">
                    <div class="msg-meta ${m.auteur_type === 'fixer' ? 'color-fixer' : 'color-production'}">${m.auteur_nom}</div>
                    <div class="bubble">${m.contenu}<div class="msg-time">${d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}</div></div>
                </div>`;
            });
            container.innerHTML = html; container.scrollTop = container.scrollHeight;
        }
        async function sendAdminMessage() {
            const input = document.getElementById('adminChatInput');
            if(!input.value.trim()) return;
            await fetch(`/api/reperages/${currentChatId}/messages`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ auteur_type: 'production', auteur_nom: 'Production', contenu: input.value }) });
            input.value = ''; loadAdminMessages();
        }
    </script>
</body>
</html>
