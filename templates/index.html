<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRÉ-REPÉRAGE | {{ FIXER_DATA.region }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="header-fixer">
        <div class="header-fixer-banner" style="background-image: url('{{ FIXER_DATA.image_region or 'https://destinationsetcuisines.com/doc/multilingue/bannerreperage.jpg' }}');">
            <div class="header-fixer-overlay">
                <img src="https://destinationsetcuisines.com/doc/logoRK.png" alt="RK" class="logo-header-fixer">
                <div class="header-fixer-content">
                    <h1 class="header-fixer-title">GRILLE DE PRÉ-REPÉRAGE</h1>
                    <h2 class="header-fixer-region">{{ FIXER_DATA.region }}</h2>
                    <div class="header-fixer-name">{{ FIXER_DATA.prenom }} {{ FIXER_DATA.nom }}</div>
                </div>
            </div>
        </div>
        <div class="header-content" style="justify-content: flex-end; padding: 15px;">
            <div class="language-selector">
                <button class="lang-btn" data-lang="FR">🇫🇷 FR</button>
                <button class="lang-btn" data-lang="GB">🇬🇧 GB</button>
                <button class="lang-btn" data-lang="ITAL">🇮🇹 ITAL</button>
                <button class="lang-btn" data-lang="ESP">🇪🇸 ESP</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="progress-container">
            <div class="progress-header"><span><i data-lucide="check-circle"></i> Progress..</span><span id="progress-percentage">0%</span></div>
            <div class="progress-bar-container"><div id="progress-bar" class="progress-bar"></div></div>
            <div class="progress-stats"><span id="progress-filled">0</span> champs remplis sur 112</div>
        </div>

        <div class="tabs-nav" style="display:flex; background:#2C3E50; border-radius:8px 8px 0 0;">
            <button class="tab-btn active" data-tab="territoire">TERRITOIRE</button>
            <button class="tab-btn" data-tab="episode">ÉPISODE</button>
            <button class="tab-btn" data-tab="gardiens">GARDIENS (3)</button>
            <button class="tab-btn" data-tab="lieux">LIEUX (3)</button>
        </div>

        <div class="tab-content active" id="territoire">
            <div class="fields-grid">
                <div class="field-group"><label>Pays</label><input type="text" name="pays" value="{{ FIXER_DATA.pays }}"></div>
                <div class="field-group"><label>Région</label><input type="text" name="region" value="{{ FIXER_DATA.region }}"></div>
                <div class="field-group"><label>Ville principale</label><input type="text" name="ville"></div>
                <div class="field-group"><label>Population</label><input type="text" name="population"></div>
                <div class="field-group"><label>Langue(s)</label><input type="text" name="langues"></div>
                <div class="field-group"><label>Période de tournage</label><input type="text" name="climat"></div>
                <div class="field-group" style="grid-column: span 2;"><label>Histoire / Contexte</label><textarea name="histoire" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Traditions Culinaires</label><textarea name="traditions" rows="3"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Autres Fêtes</label><textarea name="fetes" rows="3"></textarea></div>
                <div class="field-group"><label>Accès Logistique</label><input type="text" name="acces"></div>
                <div class="field-group"><label>Hébergement Équipe</label><input type="text" name="hebergement"></div>
                <div class="field-group" style="grid-column: span 2;"><label>Contacts Utiles</label><textarea name="contacts" rows="2"></textarea></div>
            </div>
        </div>

        <div class="tab-content" id="episode">
            <div class="fields-grid">
                <div class="field-group" style="grid-column: span 2;"><label>Angle narratif</label><textarea name="angle" rows="3"></textarea></div>
                <div class="field-group"><label>Fête centrale</label><input type="text" name="fete"></div>
                <div class="field-group"><label>Contraintes temporelles</label><input type="text" name="contraintes"></div>
                <div class="field-group" style="grid-column: span 2;"><label>Ce qu'il faut filmer (Arc)</label><textarea name="arc" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Moments-clés</label><textarea name="moments" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Éléments sensibles</label><textarea name="sensibles" rows="3"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Autorisations</label><textarea name="autorisations" rows="3"></textarea></div>
                <div class="field-group"><label>Budget local estimé</label><input type="text" name="budget"></div>
                <div class="field-group"><label>Risques identifiés</label><textarea name="notes" rows="2"></textarea></div>
            </div>
        </div>

        <div class="tab-content" id="gardiens">
            {% for i in [1, 2, 3] %}
            <div class="sub-section">
                <div class="sub-section-title">Gardien {{ i }} : Identité & Transmission</div>
                <div class="fields-grid">
                    <div class="field-group"><label>Nom</label><input type="text" name="gardien{{i}}_nom"></div>
                    <div class="field-group"><label>Prénom</label><input type="text" name="gardien{{i}}_prenom"></div>
                    <div class="field-group"><label>Âge</label><input type="number" name="gardien{{i}}_age"></div>
                    <div class="field-group"><label>Genre</label><input type="text" name="gardien{{i}}_genre"></div>
                    <div class="field-group"><label>Fonction sociale</label><input type="text" name="gardien{{i}}_fonction"></div>
                    <div class="field-group"><label>Savoir transmis</label><textarea name="gardien{{i}}_savoir"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Histoire personnelle</label><textarea name="gardien{{i}}_histoire" rows="3"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Évaluation Cinégénie</label><textarea name="gardien{{i}}_evaluation" rows="2"></textarea></div>
                    <div class="field-group"><label>Langues</label><input type="text" name="gardien{{i}}_langues"></div>
                    <div class="field-group"><label>Adresse</label><input type="text" name="gardien{{i}}_adresse"></div>
                    <div class="field-group"><label>Téléphone</label><input type="tel" name="gardien{{i}}_telephone"></div>
                    <div class="field-group"><label>Email</label><input type="email" name="gardien{{i}}_email"></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Contact Intermédiaire</label><textarea name="gardien{{i}}_contact"></textarea></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="tab-content" id="lieux">
            <div class="lieux-tabs" style="display:flex; gap:10px; margin-bottom:20px; background:#eee; padding:10px; border-radius:8px;">
                <button type="button" class="lieu-tab active" data-lieu="1" style="flex:1; padding:10px; border:none; cursor:pointer; font-weight:bold;">Lieu N°1</button>
                <button type="button" class="lieu-tab" data-lieu="2" style="flex:1; padding:10px; border:none; cursor:pointer; font-weight:bold;">Lieu N°2</button>
                <button type="button" class="lieu-tab" data-lieu="3" style="flex:1; padding:10px; border:none; cursor:pointer; font-weight:bold;">Lieu N°3</button>
            </div>
            {% for i in [1, 2, 3] %}
            <div class="lieu-content {% if i == 1 %}active{% endif %}" id="lieu-{{ i }}">
                <div class="fields-grid">
                    <div class="field-group"><label>Nom du lieu</label><input type="text" name="lieu{{i}}_nom"></div>
                    <div class="field-group"><label>Type</label><input type="text" name="lieu{{i}}_type"></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Description Visuelle</label><textarea name="lieu{{i}}_description" rows="3"></textarea></div>
                    <div class="field-group"><label>Cinégénie</label><textarea name="lieu{{i}}_cinegenie"></textarea></div>
                    <div class="field-group"><label>Axes Caméra</label><textarea name="lieu{{i}}_axes"></textarea></div>
                    <div class="field-group"><label>Points de vue</label><textarea name="lieu{{i}}_points_vue"></textarea></div>
                    <div class="field-group"><label>Lumière / Moments</label><input type="text" name="lieu{{i}}_moments"></div>
                    <div class="field-group"><label>Ambiance sonore</label><input type="text" name="lieu{{i}}_ambiance"></div>
                    <div class="field-group"><label>Adéquation Narration</label><textarea name="lieu{{i}}_adequation"></textarea></div>
                    <div class="field-group"><label>Accessibilité</label><input type="text" name="lieu{{i}}_accessibilite"></div>
                    <div class="field-group"><label>Sécurité</label><input type="text" name="lieu{{i}}_securite"></div>
                    <div class="field-group"><label>Électricité</label><input type="text" name="lieu{{i}}_electricite"></div>
                    <div class="field-group"><label>Espace équipe</label><input type="text" name="lieu{{i}}_espace"></div>
                    <div class="field-group"><label>Météo / Protection</label><input type="text" name="lieu{{i}}_protection"></div>
                    <div class="field-group"><label>Autorisations</label><input type="text" name="lieu{{i}}_permis"></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="actions-bar" style="display:flex; justify-content:flex-end; gap:20px; margin-top:40px;">
            <button id="btn-save" class="btn" style="background:#2C3E50; color:white; padding:15px 40px; border-radius:8px; font-weight:bold; cursor:pointer;">💾 ENREGISTRER</button>
            <button id="btn-submit" class="btn" style="background:#27ae60; color:white; padding:15px 40px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">✅ SOUMETTRE</button>
        </div>
    </div>
    
    <button id="chat-toggle-btn" class="chat-toggle-btn" style="position:fixed; right:30px; bottom:30px; width:60px; height:60px; border-radius:50%; background:#E67E22; color:white; border:none; cursor:pointer;"><i data-lucide="message-square"></i></button>
    <div id="chat-panel" class="chat-panel" style="position:fixed; right:-400px; top:0; width:400px; height:100vh; background:white; transition:0.3s; box-shadow:-5px 0 15px rgba(0,0,0,0.1); display:flex; flex-direction:column; z-index:2000;">
        <div style="background:#E67E22; padding:20px; color:white; display:flex; justify-content:space-between;"><span>Messages Production</span><button id="chat-close-btn" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">×</button></div>
        <div id="chat-messages" style="flex:1; overflow-y:auto; padding:20px; background:#f9f9f9;"></div>
        <div style="padding:20px; border-top:1px solid #eee; display:flex; gap:10px;"><textarea id="chat-input" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea><button id="chat-send-btn" style="background:#E67E22; color:white; border:none; border-radius:8px; padding:10px 15px;"><i data-lucide="send"></i></button></div>
    </div>

    <script>window.FIXER_DATA = {{ FIXER_DATA|tojson|safe }}; window.REPERAGE_ID = {{ REPERAGE_ID|tojson|safe }};</script>
    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
