<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repérage Terrain - RootsKeepers</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #2C3E50; --accent: #E67E22; --bg: #f3f4f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #2C3E50; }
        
        /* BANNIÈRE DYNAMIQUE (VIGNETTE) */
        .banner { 
            width: 100%; height: 250px; 
            background: var(--primary); 
            background-size: cover; 
            background-position: center;
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .banner-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); }
        .banner-content { position: relative; z-index: 1; text-align: center; color: white; }
        .banner h1 { font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .container { max-width: 800px; margin: -50px auto 50px auto; position: relative; z-index: 10; padding: 0 20px; }
        .card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9rem; color: #64748b; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; }
        textarea { height: 100px; resize: vertical; }

        .btn-save { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; transition: 0.3s; margin-top: 20px; }
        .btn-save:hover { background: #D35400; transform: translateY(-2px); }
        
        .footer { text-align: center; color: #94a3b8; font-size: 0.8rem; margin-top: 40px; }
    </style>
</head>
<body>

    <!-- Bandeau avec l'image de la région transmise par le serveur -->
    <div class="banner" id="pageBanner" style="background-image: url('{{ image_region or 'https://destinationsetcuisines.com/doc/multilingue/bannerreperage.jpg' }}');">
        <div class="banner-overlay"></div>
        <div class="banner-content">
            <img src="https://destinationsetcuisines.com/doc/logoRK.png" style="width: 200px; margin-bottom: 15px;">
            <h1>{{ region or 'Nouveau Repérage' }}</h1>
            <p>{{ pays or '' }}</p>
        </div>
    </div>

    <div class="container">
        <form id="scoutingForm" onsubmit="saveData(event)">
            <!-- Étape 1 : Le Contexte -->
            <div class="card">
                <h2><i data-lucide="map"></i> Territoire & Ambiance</h2>
                <div class="form-group">
                    <label>Histoire / Contexte du lieu</label>
                    <textarea id="territoire_histoire" name="histoire"></textarea>
                </div>
                <div class="form-group">
                    <label>Climat / Meilleure saison pour filmer</label>
                    <input type="text" id="territoire_climat" name="climat">
                </div>
            </div>

            <!-- Étape 2 : Les Gardiens (G1, G2, G3) -->
            <div class="card">
                <h2><i data-lucide="users"></i> Gardien 1 (Matière)</h2>
                <div class="form-group">
                    <label>Nom & Prénom</label>
                    <input type="text" id="g1_nom">
                </div>
                <div class="form-group">
                    <label>Fonction / Métier</label>
                    <input type="text" id="g1_fonction">
                </div>
                <div class="form-group">
                    <label>Savoir Transmis / Objet Totem</label>
                    <textarea id="g1_savoir"></textarea>
                </div>
            </div>

            <div class="card">
                <h2><i data-lucide="wrench"></i> Gardien 2 (Technique)</h2>
                <div class="form-group">
                    <label>Nom & Prénom</label>
                    <input type="text" id="g2_nom">
                </div>
                <div class="form-group">
                    <label>Savoir Transmis / Geste technique</label>
                    <textarea id="g2_savoir"></textarea>
                </div>
            </div>

            <div class="card">
                <h2><i data-lucide="message-circle"></i> Gardien 3 (Lien)</h2>
                <div class="form-group">
                    <label>Nom & Prénom</label>
                    <input type="text" id="g3_nom">
                </div>
                <div class="form-group">
                    <label>Rôle social / Vente / Parole</label>
                    <textarea id="g3_savoir"></textarea>
                </div>
            </div>

            <!-- Étape 3 : La Fête -->
            <div class="card">
                <h2><i data-lucide="sparkles"></i> Convergence (+1)</h2>
                <div class="form-group">
                    <label>Nom de la fête ou du rituel final</label>
                    <input type="text" id="fete_nom">
                </div>
                <div class="form-group">
                    <label>Action prévue lors du final</label>
                    <textarea id="fete_action"></textarea>
                </div>
            </div>

            <button type="submit" class="btn-save" id="btnSave">
                <i data-lucide="save"></i> ENREGISTRER MON REPÉRAGE
            </button>
        </form>

        <div class="footer">
            RootsKeepers System &copy; 2026 - Plateforme sécurisée de pré-production
        </div>
    </div>

    <script>
        lucide.createIcons();
        const reperageId = {{ reperage_id or 'null' }};

        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.innerText = "⏳ ENREGISTREMENT...";
            btn.disabled = true;

            // Préparation des données (Structure compatible app.py)
            const payload = {
                territoire_data: {
                    histoire: document.getElementById('territoire_histoire').value,
                    climat: document.getElementById('territoire_climat').value
                },
                gardiens: [
                    { nom: document.getElementById('g1_nom').value, fonction: document.getElementById('g1_fonction').value, savoir_transmis: document.getElementById('g1_savoir').value, ordre: 1 },
                    { nom: document.getElementById('g2_nom').value, savoir_transmis: document.getElementById('g2_savoir').value, ordre: 2 },
                    { nom: document.getElementById('g3_nom').value, savoir_transmis: document.getElementById('g3_savoir').value, ordre: 3 }
                ],
                episode_data: {
                    fete: document.getElementById('fete_nom').value,
                    action: document.getElementById('fete_action').value
                }
            };

            try {
                const res = await fetch(`/api/reperages/${reperageId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    alert("✅ Données sauvegardées ! Merci pour votre travail terrain.");
                    btn.innerText = "✅ SAUVEGARDÉ";
                    btn.style.background = "#27ae60";
                } else {
                    alert("⚠️ Erreur lors de la sauvegarde.");
                    btn.disabled = false;
                    btn.innerText = "RÉESSAYER";
                }
            } catch (error) {
                alert("Erreur réseau");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
