<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOC-OS | PRÉ-REPÉRAGE : {{ FIXER_DATA.region }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Quill WYSIWYG Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* SOUDURE ARCHITECTURALE V.43 */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        .sub-section { border-left: 4px solid var(--secondary-color); padding: 20px; background: #fafafa; margin-bottom: 25px; border-radius: 0 8px 8px 0; }
        .sub-section-title { font-weight: 800; color: var(--primary-color); text-transform: uppercase; margin-bottom: 15px; font-size: 0.9rem; letter-spacing: 1px; }
        .lieu-content { display: none; }
        .lieu-content.active { display: block; }
    </style>
</head>
<body>
    
    <!-- BANDEAU ORIGINAL RK (RESTAURATION INTÉGRALE) -->
    <header class="header-fixer">
        <div class="header-fixer-banner" style="background-image: url('{{ FIXER_DATA.image_region or 'https://destinationsetcuisines.com/doc/multilingue/bannerreperage.jpg' }}');">
            <div class="header-fixer-overlay">
                <img src="https://destinationsetcuisines.com/doc/logoRK.png" alt="RK" class="logo-header-fixer">
                <div class="header-fixer-content">
                    <h1 class="header-fixer-title" data-i18n="header.title">GRILLE DE PRÉ-REPÉRAGE</h1>
                    <h2 class="header-fixer-region">{{ FIXER_DATA.region }}</h2>
                    <div class="header-fixer-name">{{ FIXER_DATA.prenom }} {{ FIXER_DATA.nom }}</div>
                </div>
            </div>
        </div>
        <div class="header-content" style="justify-content: flex-end; padding: 15px;">
            <div class="language-selector">
                <button class="lang-btn" data-lang="FR">🇫🇷 FR</button>
                <button class="lang-btn" data-lang="GB">🇬🇧 GB</button>
                <button class="lang-btn" data-lang="ITAL">🇮🇹 ITAL</button>
                <button class="lang-btn" data-lang="ESP">🇪🇸 ESP</button>
            </div>
        </div>
    </header>
    
    <div class="container">
        
        <!-- COMPTEUR DE PROGRESSION SYNC 112 -->
        <div class="progress-container" id="progress-container">
            <div class="progress-header">
                <span><i data-lucide="check-circle"></i> Progress..</span>
                <span id="progress-percentage" class="progress-percentage">0%</span>
            </div>
            <div class="progress-bar-container"><div id="progress-bar" class="progress-bar"></div></div>
            <div class="progress-stats">
                <span id="progress-filled">0</span> champs remplis sur 112
            </div>
        </div>
        
        <!-- NAVIGATION 5 ONGLETS -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="territoire" data-i18n="tabs.territoire">TERRITOIRE</button>
            <button class="tab-btn" data-tab="particularites" data-i18n="tabs.particularites">PARTICULARITÉS</button>
            <button class="tab-btn" data-tab="gardiens" data-i18n="tabs.gardiens">GARDIENS (3)</button>
            <button class="tab-btn" data-tab="lieux" data-i18n="tabs.lieux">LIEUX (3)</button>
            <button class="tab-btn" data-tab="fete" data-i18n="tabs.fete">LA FÊTE</button>
        </div>

        <!-- TAB 1: TERRITOIRE -->
        <div class="tab-content active" id="territoire">
            <div class="fields-grid">
                <div class="field-group"><label data-i18n="territoire.pays">Pays</label><input type="text" name="pays" value="{{ FIXER_DATA.pays }}"></div>
                <div class="field-group"><label data-i18n="territoire.region">Région / Province</label><input type="text" name="region" value="{{ FIXER_DATA.region }}"></div>
                <div class="field-group"><label data-i18n="territoire.ville">Ville principale</label><input type="text" name="ville"></div>
                <div class="field-group"><label data-i18n="territoire.population">Estimation population</label><input type="text" name="population"></div>
                <div class="field-group"><label data-i18n="territoire.langues">Langues parlées</label><input type="text" name="langues"></div>
                <div class="field-group"><label data-i18n="territoire.climat">Période de tournage</label><input type="text" name="climat"></div>
                <div class="field-group" style="grid-column: span 2;"><label data-i18n="territoire.histoire">Histoire & Contexte Culturel</label><textarea name="histoire" rows="4"></textarea></div>
                <div class="field-group"><label data-i18n="territoire.acces">Accès logistique</label><input type="text" name="acces"></div>
                <div class="field-group"><label data-i18n="territoire.hebergement">Hébergement équipe</label><input type="text" name="hebergement"></div>
            </div>
        </div>

        <!-- TAB 2: PARTICULARITÉS RÉGIONALES -->
        <div class="tab-content" id="particularites">
            <div class="fields-grid">
                <div class="field-group" style="grid-column: span 2;"><label data-i18n="episode.angle">Angle narratif envisagé</label><textarea name="angle" rows="3"></textarea></div>
                <div class="field-group"><label data-i18n="episode.fete">Fête ou événement central</label><input type="text" name="fete_nom"></div>
                <div class="field-group"><label data-i18n="episode.contraintes">Contraintes temporelles</label><input type="text" name="contraintes"></div>
                <div class="field-group" style="grid-column: span 2;"><label data-i18n="episode.arc">Ce qu'il faut absolument filmer</label><textarea name="arc" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label data-i18n="episode.moments">Moments-clés identifiés</label><textarea name="moments" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label data-i18n="episode.sensibles">Éléments culturels sensibles</label><textarea name="sensibles" rows="3"></textarea></div>
                <div class="field-group"><label data-i18n="episode.budget">Budget local estimé</label><input type="text" name="budget"></div>
                <div class="field-group"><label data-i18n="episode.notes">Risques identifiés</label><textarea name="notes" rows="2"></textarea></div>
            </div>
        </div>

        <!-- TAB 3: GARDIENS (TRIPTYQUE - 10 CHAMPS) -->
        <div class="tab-content" id="gardiens">
            {% for i in [1, 2, 3] %}
            <div class="sub-section">
                <div class="sub-section-title">Gardien {{ i }}</div>
                <div class="fields-grid">
                    <div class="field-group"><label data-i18n="gardiens_details.nom">Nom & Prénom</label><input type="text" name="gardien{{i}}_nom_prenom"></div>
                    <div class="field-group"><label data-i18n="gardiens_details.age">Âge</label><input type="number" name="gardien{{i}}_age"></div>
                    <div class="field-group"><label data-i18n="gardiens_details.fonction">Fonction sociale</label><input type="text" name="gardien{{i}}_fonction"></div>
                    <div class="field-group"><label data-i18n="gardiens_details.savoir">Savoir-faire transmis</label><textarea name="gardien{{i}}_savoir" rows="2"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label data-i18n="gardiens_details.histoire">Histoire personnelle & Parcours</label><textarea name="gardien{{i}}_histoire" rows="3"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Portrait Psychologique</label><textarea name="gardien{{i}}_psychologie" rows="3"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label data-i18n="gardiens_details.evaluation">Évaluation Cinégénie</label><textarea name="gardien{{i}}_evaluation" rows="2"></textarea></div>
                    <div class="field-group"><label>Langues maîtrisées</label><input type="text" name="gardien{{i}}_langues"></div>
                    <div class="field-group"><label>Contact (Tel/Email)</label><input type="text" name="gardien{{i}}_contact"></div>
                    <div class="field-group"><label>Intermédiaire</label><input type="text" name="gardien{{i}}_intermediaire"></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- TAB 4: LIEUX (TRIPTYQUE - 15 CHAMPS) -->
        <div class="tab-content" id="lieux">
            <div class="lieux-tabs" style="display:flex; gap:10px; margin-bottom:20px; background:#eee; padding:10px; border-radius:8px;">
                <button type="button" class="lieu-tab active" data-lieu="1" style="flex:1; padding:10px; border:none; cursor:pointer; font-weight:bold;">Lieu N°1</button>
                <button type="button" class="lieu-tab" data-lieu="2" style="flex:1; padding:10px; border:none; cursor:pointer; font-weight:bold;">Lieu N°2</button>
                <button type="button" class="lieu-tab" data-lieu="3" style="flex:1; padding:10px; border:none; cursor:pointer; font-weight:bold;">Lieu N°3</button>
            </div>
            {% for i in [1, 2, 3] %}
            <div class="lieu-content {% if i == 1 %}active{% endif %}" id="lieu-{{ i }}">
                <div class="fields-grid">
                    <div class="field-group"><label data-i18n="lieux.nom">Nom du lieu</label><input type="text" name="lieu{{i}}_nom"></div>
                    <div class="field-group"><label data-i18n="lieux.type">Type</label><input type="text" name="lieu{{i}}_type"></div>
                    <div class="field-group" style="grid-column: span 2;"><label data-i18n="lieux.description">Description visuelle</label><textarea name="lieu{{i}}_description" rows="2"></textarea></div>
                    <div class="field-group"><label data-i18n="lieux.cinegenie">Cinégénie</label><textarea name="lieu{{i}}_cinegenie"></textarea></div>
                    <div class="field-group"><label data-i18n="lieux.axes">Axes Caméra</label><textarea name="lieu{{i}}_axes"></textarea></div>
                    <div class="field-group"><label data-i18n="lieux.points_vue">Points de vue</label><textarea name="lieu{{i}}_points_vue"></textarea></div>
                    <div class="field-group"><label>Lumière / Moments</label><input type="text" name="lieu{{i}}_moments"></div>
                    <div class="field-group"><label>Ambiance sonore</label><input type="text" name="lieu{{i}}_son"></div>
                    <div class="field-group" style="grid-column: span 2;"><label data-i18n="lieux.adequation">Adéquation Narration</label><textarea name="lieu{{i}}_adequation"></textarea></div>
                    <div class="field-group"><label data-i18n="lieux.accessibilite">Accessibilité</label><input type="text" name="lieu{{i}}_acces"></div>
                    <div class="field-group"><label>Sécurité</label><input type="text" name="lieu{{i}}_securite"></div>
                    <div class="field-group"><label data-i18n="lieux.electricite">Électricité</label><input type="text" name="lieu{{i}}_elec"></div>
                    <div class="field-group"><label>Espace équipe</label><input type="text" name="lieu{{i}}_espace"></div>
                    <div class="field-group"><label>Protection Météo</label><input type="text" name="lieu{{i}}_meteo"></div>
                    <div class="field-group"><label data-i18n="lieux.permis">Autorisations</label><input type="text" name="lieu{{i}}_permis"></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <!--
