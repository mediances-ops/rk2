<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Préparation Repérage - RootsKeepers</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    
    <!-- BANDEAU ORIGINAL RK (NON MODIFIÉ) -->
    <header class="header-fixer">
        <div class="header-fixer-banner" style="background-image: url('{{ FIXER_DATA.image_region or 'https://destinationsetcuisines.com/doc/multilingue/bannerreperage.jpg' }}');">
            <div class="header-fixer-overlay">
                <img src="https://destinationsetcuisines.com/doc/logoRK.png" alt="RootsKeepers" class="logo-header-fixer">
                <div class="header-fixer-content">
                    <h1 class="header-fixer-title" data-i18n="header.title">PRÉPARATION REPÉRAGE</h1>
                    <h2 class="header-fixer-region">{{ FIXER_DATA.region }}</h2>
                    <div class="header-fixer-name">{{ FIXER_DATA.prenom }} {{ FIXER_DATA.nom }}</div>
                </div>
            </div>
        </div>
        <div class="header-content">
            <div class="language-selector">
                <button class="lang-btn" data-lang="FR">🇫🇷 FR</button>
                <button class="lang-btn" data-lang="GB">🇬🇧 GB</button>
                <button class="lang-btn" data-lang="ITAL">🇮🇹 ITAL</button>
                <button class="lang-btn" data-lang="ESP">🇪🇸 ESP</button>
            </div>
            <!-- AUCUN BOUTON DÉCONNEXION ICI (FIX 9) -->
        </div>
    </header>
    
    <div class="container">
        <!-- COMPTEUR DE PROGRESSION 112 CHAMPS -->
        <div class="progress-container">
            <div class="progress-header">
                <span><i data-lucide="check-circle"></i> Progress..</span>
                <span id="progress-percentage">0%</span>
            </div>
            <div class="progress-bar-container"><div class="progress-bar" id="progress-bar"></div></div>
            <div class="progress-stats"><span id="progress-filled">0</span> champs remplis sur 112</div>
        </div>

        <!-- GRILLE INTÉGRALE (Territoire, Épisode, 3 Gardiens, 3 Lieux) -->
        <!-- [Ici insérez le contenu des 112 champs sans aucune simplification] -->
        <div class="tabs-nav">
             <button class="tab-btn active" data-tab="territoire">TERRITOIRE</button>
             <button class="tab-btn" data-tab="episode">ÉPISODE</button>
             <button class="tab-btn" data-tab="gardiens">GARDIENS</button>
             <button class="tab-btn" data-tab="lieux">LIEUX</button>
        </div>
        <!-- ... Contenu des Tabs restauré ... -->
    </div>
    
    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
