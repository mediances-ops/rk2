<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>DOC-OS | PRÉ-REPÉRAGE</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .sub-section { border-left: 4px solid #E67E22; padding: 20px; background: #fafafa; margin-bottom: 25px; }
    </style>
</head>
<body>
    <header class="header-fixer">
        <div class="header-fixer-banner" style="background-image: url('{{ FIXER_DATA.image_region or 'https://destinationsetcuisines.com/doc/multilingue/bannerreperage.jpg' }}');">
            <div class="header-fixer-overlay">
                <img src="https://destinationsetcuisines.com/doc/logoRK.png" alt="RK" class="logo-header-fixer">
                <div class="header-fixer-content">
                    <h1 class="header-fixer-title">GRILLE DE PRÉ-REPÉRAGE</h1>
                    <h2 class="header-fixer-region">{{ FIXER_DATA.region }}</h2>
                    <div class="header-fixer-name">{{ FIXER_DATA.prenom }} {{ FIXER_DATA.nom }}</div>
                </div>
            </div>
        </div>
    </header>
    
    <div class="container">
        <!-- PROGRESSION -->
        <div class="progress-container">
            <div class="progress-header"><span>Progress..</span><span id="progress-percentage">0%</span></div>
            <div class="progress-bar-container"><div id="progress-bar" class="progress-bar"></div></div>
            <div class="progress-stats"><span id="progress-filled">0</span> champs remplis sur 112</div>
        </div>

        <div class="tabs-nav" style="display:flex; background:#2C3E50; border-radius:8px 8px 0 0;">
            <button class="tab-btn active" data-tab="territoire">TERRITOIRE</button>
            <button class="tab-btn" data-tab="particularites">PARTICULARITÉS</button>
            <button class="tab-btn" data-tab="gardiens">GARDIENS (3)</button>
            <button class="tab-btn" data-tab="lieux">LIEUX (3)</button>
            <button class="tab-btn" data-tab="fete">LA FÊTE</button>
        </div>

        <!-- 1. TERRITOIRE -->
        <div class="tab-content active" id="territoire">
            <div class="fields-grid">
                <div class="field-group"><label>Pays</label><input type="text" name="pays" value="{{ FIXER_DATA.pays }}"></div>
                <div class="field-group"><label>Région / Province</label><input type="text" name="region" value="{{ FIXER_DATA.region }}"></div>
                <div class="field-group"><label>Ville principale</label><input type="text" name="ville"></div>
                <div class="field-group"><label>Estimation population</label><input type="text" name="population"></div>
                <div class="field-group"><label>Langues parlées</label><input type="text" name="langues"></div>
                <div class="field-group"><label>Date de tournage envisagée</label><input type="text" name="climat"></div>
                <div class="field-group" style="grid-column: span 2;"><label>Histoire & Contexte Culturel</label><textarea name="histoire" rows="4"></textarea></div>
                <div class="field-group"><label>Accès logistique</label><input type="text" name="acces"></div>
                <div class="field-group"><label>Hébergement équipe</label><input type="text" name="hebergement"></div>
            </div>
        </div>

        <!-- 2. PARTICULARITÉS -->
        <div class="tab-content" id="particularites">
            <div class="fields-grid">
                <div class="field-group" style="grid-column: span 2;"><label>Angle narratif envisagé</label><textarea name="angle" rows="3"></textarea></div>
                <div class="field-group"><label>Fête ou événement central</label><input type="text" name="fete_nom"></div>
                <div class="field-group"><label>Contraintes temporelles</label><input type="text" name="contraintes"></div>
                <div class="field-group" style="grid-column: span 2;"><label>Ce qu'il faut absolument filmer</label><textarea name="arc" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Moments-clés identifiés</label><textarea name="moments" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Éléments culturels sensibles</label><textarea name="sensibles" rows="3"></textarea></div>
                <div class="field-group"><label>Budget local estimé</label><input type="text" name="budget"></div>
                <div class="field-group"><label>Risques identifiés</label><textarea name="notes" rows="2"></textarea></div>
            </div>
        </div>

        <!-- 3. GARDIENS (3x10) -->
        <div class="tab-content" id="gardiens">
            {% for i in [1, 2, 3] %}
            <div class="sub-section">
                <div class="sub-section-title">Gardien {{ i }}</div>
                <div class="fields-grid">
                    <div class="field-group"><label>Nom & Prénom</label><input type="text" name="gardien{{i}}_nom_prenom"></div>
                    <div class="field-group"><label>Âge</label><input type="number" name="gardien{{i}}_age"></div>
                    <div class="field-group"><label>Fonction sociale</label><input type="text" name="gardien{{i}}_fonction"></div>
                    <div class="field-group"><label>Savoir-faire transmis</label><textarea name="gardien{{i}}_savoir" rows="2"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Histoire personnelle & Parcours</label><textarea name="gardien{{i}}_histoire" rows="3"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Psychologie & Motivations</label><textarea name="gardien{{i}}_psychologie" rows="3"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Évaluation Cinégénie</label><textarea name="gardien{{i}}_evaluation" rows="2"></textarea></div>
                    <div class="field-group"><label>Langues</label><input type="text" name="gardien{{i}}_langues"></div>
                    <div class="field-group"><label>Contact (Adresse/Tel/Email)</label><input type="text" name="gardien{{i}}_contact"></div>
                    <div class="field-group"><label>Intermédiaire de confiance</label><input type="text" name="gardien{{i}}_intermediaire"></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- 4. LIEUX (3x15) -->
        <div class="tab-content" id="lieux">
            {% for i in [1, 2, 3] %}
            <div class="sub-section">
                <div class="sub-section-title">Lieu N°{{ i }}</div>
                <div class="fields-grid">
                    <div class="field-group"><label>Nom du lieu</label><input type="text" name="lieu{{i}}_nom"></div>
                    <div class="field-group"><label>Type d'environnement</label><input type="text" name="lieu{{i}}_type"></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Description visuelle</label><textarea name="lieu{{i}}_description" rows="2"></textarea></div>
                    <div class="field-group"><label>Cinégénie</label><textarea name="lieu{{i}}_cinegenie"></textarea></div>
                    <div class="field-group"><label>Axes Caméra</label><textarea name="lieu{{i}}_axes"></textarea></div>
                    <div class="field-group"><label>Points de vue</label><textarea name="lieu{{i}}_points_vue"></textarea></div>
                    <div class="field-group"><label>Lumière / Moments</label><input type="text" name="lieu{{i}}_moments"></div>
                    <div class="field-group"><label>Ambiance sonore</label><input type="text" name="lieu{{i}}_son"></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Adéquation Narration</label><textarea name="lieu{{i}}_adequation"></textarea></div>
                    <div class="field-group"><label>Accessibilité</label><input type="text" name="lieu{{i}}_acces"></div>
                    <div class="field-group"><label>Sécurité</label><input type="text" name="lieu{{i}}_securite"></div>
                    <div class="field-group"><label>Électricité</label><input type="text" name="lieu{{i}}_elec"></div>
                    <div class="field-group"><label>Espace équipe</label><input type="text" name="lieu{{i}}_espace"></div>
                    <div class="field-group"><label>Protection Météo</label><input type="text" name="lieu{{i}}_meteo"></div>
                    <div class="field-group"><label>Autorisations / Permis</label><input type="text" name="lieu{{i}}_permis"></div>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- 5. LA FÊTE -->
        <div class="tab-content" id="fete">
            <div class="fields-grid">
                <div class="field-group"><label>Lieu & Date précise</label><input type="text" name="fete_lieu_date"></div>
                <div class="field-group" style="grid-column: span 2;"><label>Pourquoi cette fête ? (Sens sacré/social)</label><textarea name="fete_pourquoi" rows="3"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Histoire & Origines ancestrales</label><textarea name="fete_origines" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Comment se déroule-t-elle ? (Phases)</label><textarea name="fete_deroulement" rows="4"></textarea></div>
                <div class="field-group" style="grid-column: span 2;"><label>Que filmer ? (Substance visuelle & Climax)</label><textarea name="fete_visuel" rows="4"></textarea></div>
                <div class="field-group"><label>Responsable Organisation & Contact</label><input type="text" name="fete_responsable"></div>
            </div>
        </div>

        <div class="actions-bar" style="display:flex; justify-content:flex-end; gap:20px; margin-top:40px;">
            <button id="btn-save" class="btn" style="background:#2C3E50; color:white; padding:15px 40px; border-radius:8px; font-weight:bold; cursor:pointer;">💾 ENREGISTRER</button>
            <button id="btn-submit" class="btn" style="background:#27ae60; color:white; padding:15px 40px; border-radius:8px; border:none; font-weight:bold; cursor:pointer;">✅ SOUMETTRE</button>
        </div>
    </div>
    <script src="/static/js/app.js"></script>
</body>
</html>
