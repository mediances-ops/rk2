<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOC-OS | Scouting Grid</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #2C3E50; --secondary: #E67E22; --lock: #e74c3c; --glass: rgba(255, 255, 255, 0.95); }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f3f4f6; color: var(--primary); margin: 0; overflow-x: hidden; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
        
        /* BANNIÈRES & ALIGNEMENT */
        #lock-banner { display: none; position: sticky; top: 0; background: var(--lock); color: white; text-align: center; padding: 15px; font-weight: 900; z-index: 10000; letter-spacing: 2px; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 15px 40px; border-radius: 50px; font-weight: 800; z-index: 11000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .header-fixer-banner { height: 450px; background-size: cover !important; background-position: center !important; display: flex; align-items: center; justify-content: center; position: relative; }
        .header-fixer-overlay { text-align: center; text-shadow: 0 5px 25px rgba(0,0,0,0.9); z-index: 2; position: relative; }
        .header-fixer-title { font-size: 5rem; font-weight: 900; color: white; margin: 0; }
        .fixer-name-display { color: white; font-size: 1.4rem; font-weight: 700; margin-top: 15px; text-transform: uppercase; letter-spacing: 2px; }

        .progress-container { background: white; padding: 40px; border-radius: 20px; margin-top: -60px; position: relative; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.1); margin-bottom: 40px; }
        .progress-bar-bg { background: #edf2f7; height: 15px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-bar { height: 100%; background: var(--secondary); transition: 0.6s; width: 0%; }

        /* NAVIGATION & TABS */
        .tabs-nav { display: flex; gap: 10px; margin-bottom: -1px; background: transparent; }
        .tab-btn { background: transparent; border: none; padding: 20px 35px; border-radius: 15px 15px 0 0; cursor: pointer; font-weight: 800; color: #7f8c8d; font-size: 1rem; transition: 0.3s; border-bottom: 4px solid transparent; }
        .tab-btn.active { background: white; color: var(--secondary); border-bottom: 4px solid var(--secondary); box-shadow: 0 -5px 15px rgba(0,0,0,0.05); }

        .tab-content { display: none; background: white; padding: 60px; border-radius: 0 25px 25px 25px; border: 1px solid #e2e8f0; box-shadow: 0 25px 50px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        /* GRILLE DE CHAMPS (RESTAURATION V.69.2) */
        .fields-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 45px; }
        .field-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .field-group label { font-weight: 800; font-size: 0.85rem; color: #95a5a6; text-transform: uppercase; margin-bottom: 12px; }
        .field-group input, .field-group select, .field-group textarea { width: 100%; padding: 16px; border: 2px solid #eef2f7; border-radius: 12px; font-family: inherit; font-weight: 600; outline: none; transition: 0.3s; background: #fafafa; }
        .field-group input:focus, .field-group textarea:focus { border-color: var(--secondary); background: white; }
        
        textarea { grid-column: 1 / -1; width: 100% !important; min-height: 100px; }
        .sub-section { border-left: 8px solid var(--secondary); padding: 40px; background: #fdfdfd; margin-bottom: 50px; border-radius: 0 20px 20px 0; }

        /* CHAT SUPRÊME (RESTAURATION V.69.2) */
        .chat-panel { position: fixed; right: -520px; top: 0; width: 500px; height: 100vh; background: var(--glass); backdrop-filter: blur(25px); transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); z-index: 20000; box-shadow: -20px 0 50px rgba(0,0,0,0.15); display: flex; flex-direction: column; border-left: 1px solid rgba(255,255,255,0.3); }
        .chat-panel.active { right: 0; }
        .chat-header { background: var(--primary); color: white; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        .chat-input-zone { padding: 30px; background: white; border-top: 1px solid #f1f1f1; display: flex; gap: 15px; }
        #chat-input { flex: 1; border: 2px solid #eef2f7; border-radius: 15px; padding: 15px; height: 80px; resize: none; font-family: inherit; font-weight: 600; }
        #chat-send-btn { background: var(--secondary); color: white; border: none; border-radius: 15px; width: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .chat-toggle-btn { position: fixed; right: 30px; bottom: 30px; width: 75px; height: 75px; border-radius: 50%; background: var(--secondary); color: white; border: none; cursor: pointer; z-index: 15000; display: flex; align-items: center; justify-content: center; box-shadow: 0 12px 30px rgba(230,126,34,0.4); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="lock-banner">⚠️ DATA LOCKED - SUBMITTED TO PRODUCTION</div>
    <div id="toast">YOUR FORM HAS BEEN SAVED</div>

    <header class="header-fixer-banner" style="background-image: url('{{ FIXER_DATA.image_region or '' }}');">
        <div class="header-fixer-overlay">
            <h1 class="header-fixer-title">{{ FIXER_DATA.region }}</h1>
            <div style="color: var(--secondary); font-weight: 900; letter-spacing: 8px; font-size: 1.6rem; margin-top: 10px;">LOCATION SCOUTING GRID</div>
            <div class="fixer-name-display">{{ FIXER_DATA.fixer_nom or '' }}</div>
        </div>
    </header>

    <div class="container">
        <div class="progress-container">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:900; font-size:1.8rem; letter-spacing:-1px;">PROGRESS</span>
                <span id="progress-percentage" style="font-weight:900; color:var(--secondary); font-size:1.8rem;">0%</span>
            </div>
            <div class="progress-bar-bg"><div id="progress-bar" class="progress-bar"></div></div>
            <div style="font-weight:800; color:#95a5a6; font-size:0.9rem; letter-spacing:1px;">
                <span id="progress-filled">0</span> FIELDS COMPLETED / <span id="progress-total">100</span>
            </div>
        </div>

        <nav class="tabs-nav">
            <button class="tab-btn active" data-tab="tab-territory">1. TERRITORY</button>
            <button class="tab-btn" data-tab="tab-pair1">2. GUARDIAN / LOCATION N°1</button>
            <button class="tab-btn" data-tab="tab-pair2">3. GUARDIAN / LOCATION N°2</button>
            <button class="tab-btn" data-tab="tab-pair3">4. GUARDIAN / LOCATION N°3</button>
            <button class="tab-btn" data-tab="tab-festivity">5. FESTIVITY</button>
        </nav>

        <div class="tabs-container">
            <div class="tab-content active" id="tab-territory">
                <div class="fields-grid">
                    <div class="field-group"><label>Country (Locked)</label><input type="text" name="pays" class="scouting-field" readonly></div>
                    <div class="field-group"><label>Region (Locked)</label><input type="text" name="region" class="scouting-field" readonly></div>
                    <div class="field-group"><label>Target Cities*</label><input type="text" name="villes" class="scouting-field" required></div>
                    <div class="field-group"><label>Total Population</label><input type="text" name="population" class="scouting-field"></div>
                    <div class="field-group"><label>Languages</label><input type="text" name="langues" class="scouting-field"></div>
                    <div class="field-group"><label>Planned Date / Climate</label><input type="text" name="climat" class="scouting-field"></div>
                    <div class="field-group" style="grid-column: span 2;"><label>History & Regional Context</label><textarea name="histoire" class="scouting-field" rows="5"></textarea></div>
                    <div class="field-group"><label>Traditions & Culture</label><textarea name="traditions" class="scouting-field" rows="5"></textarea></div>
                    <div class="field-group"><label>Estimated Local Budget</label><input type="text" name="budget" class="scouting-field"></div>
                    <div class="field-group"><label>Logistical Access*</label><textarea name="acces" class="scouting-field" rows="3" required></textarea></div>
                    <div class="field-group"><label>Crew Accommodation*</label><textarea name="hebergement" class="scouting-field" rows="3" required></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>General Production Notes</label><textarea name="notes" class="scouting-field" rows="3"></textarea></div>
                    <div class="field-group"><label>Narrative Arc</label><textarea name="arc" class="scouting-field" rows="3"></textarea></div>
                    <div class="field-group"><label>Key Moments</label><textarea name="moments" class="scouting-field" rows="3"></textarea></div>
                    <div class="field-group"><label>Sensitive Elements</label><textarea name="sensibles" class="scouting-field" rows="3"></textarea></div>
                    <div class="field-group"><label>Time Constraints</label><textarea name="contraintes" class="scouting-field" rows="3"></textarea></div>
                </div>
            </div>

            {% for i in [1, 2, 3] %}
            <div class="tab-content" id="tab-pair{{i}}">
                <div class="sub-section">
                    <h3 style="font-weight:900; margin-bottom:25px;">The Guardian n°{{i}}</h3>
                    <div class="fields-grid">
                        <div class="field-group"><label>Full Name*</label><input type="text" name="gardien{{i}}_nom_prenom" class="scouting-field" required></div>
                        <div class="field-group"><label>Age*</label><input type="number" name="gardien{{i}}_age" class="scouting-field" required></div>
                        <div class="field-group"><label>Role / Function*</label><input type="text" name="gardien{{i}}_fonction" class="scouting-field" required></div>
                        <div class="field-group" style="grid-column: span 2;"><label>Personal Background*</label><textarea name="gardien{{i}}_histoire" class="scouting-field" rows="3" required></textarea></div>
                        <div class="field-group"><label>Specific Knowledge</label><textarea name="gardien{{i}}_savoir" class="scouting-field" rows="3"></textarea></div>
                        <div class="field-group" style="grid-column: span 2;"><label>Psychological Portrait*</label><textarea name="gardien{{i}}_psychologie" class="scouting-field" rows="3" required></textarea></div>
                        <div class="field-group"><label>On-Camera Potential</label><textarea name="gardien{{i}}_evaluation" class="scouting-field" rows="2"></textarea></div>
                        <div class="field-group"><label>Languages</label><input type="text" name="gardien{{i}}_langues" class="scouting-field"></div>
                        <div class="field-group"><label>Direct Contact</label><input type="text" name="gardien{{i}}_contact" class="scouting-field"></div>
                        <div class="field-group"><label>Local Intermediate*</label><input type="text" name="gardien{{i}}_intermediaire" class="scouting-field" required></div>
                    </div>
                </div>
                <div class="sub-section" style="border-left-color: var(--primary);">
                    <h3 style="font-weight:900; margin-bottom:25px;">The Location n°{{i}}</h3>
                    <div class="fields-grid">
                        <div class="field-group"><label>Place Name*</label><input type="text" name="lieu{{i}}_nom" class="scouting-field" required></div>
                        <div class="field-group"><label>Environment Type*</label><input type="text" name="lieu{{i}}_type" class="scouting-field" required></div>
                        <div class="field-group"><label>Lat*</label><input type="text" name="lieu{{i}}_gps_lat" class="scouting-field" required></div>
                        <div class="field-group"><label>Long*</label><input type="text" name="lieu{{i}}_gps_long" class="scouting-field" required></div>
                        <div class="field-group" style="grid-column: span 2;"><label>Visual Description*</label><textarea name="lieu{{i}}_description" class="scouting-field" rows="4" required></textarea></div>
                        <div class="field-group"><label>Cinematic Potential</label><textarea name="lieu{{i}}_cinegenie" class="scouting-field" rows="2"></textarea></div>
                        <div class="field-group"><label>Technical Angles</label><textarea name="lieu{{i}}_axes" class="scouting-field" rows="2"></textarea></div>
                        <div class="field-group"><label>Viewpoints</label><textarea name="lieu{{i}}_points_vue" class="scouting-field" rows="2"></textarea></div>
                        <div class="field-group"><label>Timing</label><input type="text" name="lieu{{i}}_moments" class="scouting-field"></div>
                        <div class="field-group"><label>Sound</label><input type="text" name="lieu{{i}}_son" class="scouting-field"></div>
                        <div class="field-group"><label>Access</label><input type="text" name="lieu{{i}}_acces" class="scouting-field"></div>
                        <div class="field-group"><label>Security</label><input type="text" name="lieu{{i}}_securite" class="scouting-field"></div>
                        <div class="field-group"><label>Electricity</label><input type="text" name="lieu{{i}}_elec" class="scouting-field"></div>
                        <div class="field-group"><label>Crew Space</label><input type="text" name="lieu{{i}}_espace" class="scouting-field"></div>
                        <div class="field-group"><label>Weather</label><input type="text" name="lieu{{i}}_meteo" class="scouting-field"></div>
                        <div class="field-group"><label>Permits</label><input type="text" name="lieu{{i}}_permis" class="scouting-field"></div>
                    </div>
                </div>
            </div>
            {% endfor %}

            <div class="tab-content" id="tab-festivity">
                <div class="fields-grid">
                    <div class="field-group"><label>Festival Name*</label><input type="text" name="fete_nom" class="scouting-field" required></div>
                    <div class="field-group"><label>Exact Date*</label><input type="text" name="fete_date" class="scouting-field" required></div>
                    <div class="field-group"><label>Lat*</label><input type="text" name="fete_gps_lat" class="scouting-field" required></div>
                    <div class="field-group"><label>Long*</label><input type="text" name="fete_gps_long" class="scouting-field" required></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Origins</label><textarea name="fete_origines" class="scouting-field" rows="5"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Visuals</label><textarea name="fete_visuel" class="scouting-field" rows="5"></textarea></div>
                    <div class="field-group" style="grid-column: span 2;"><label>Event Sequence</label><textarea name="fete_deroulement" class="scouting-field" rows="4"></textarea></div>
                    <div class="field-group"><label>Organizer Contact*</label><input type="text" name="fete_responsable" class="scouting-field" required></div>
                </div>
            </div>
        </div>

        <div style="display:flex; gap:25px; justify-content:flex-end; margin:100px 0;">
            <button id="btn-save" style="background:var(--primary); color:white; padding:25px 70px; border-radius:18px; font-weight:900; border:none; cursor:pointer;">💾 SAVE DRAFT</button>
            <button id="btn-submit" style="background:#27ae60; color:white; padding:25px 70px; border-radius:18px; font-weight:900; border:none; cursor:pointer;">🚀 SUBMIT TO PRODUCTION</button>
        </div>
    </div>

    <button id="chat-toggle-btn" class="chat-toggle-btn"><i data-lucide="message-circle" style="width:38px; height:38px;"></i></button>
    <div id="chat-panel" class="chat-panel">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;"><div style="width:12px; height:12px; background:#2ecc71; border-radius:50%;"></div><h3 style="font-weight:900; margin:0;">CHAT</h3></div>
            <button id="chat-close-btn" style="background:none; border:none; color:white; font-size:2rem; cursor:pointer;">&times;</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-zone">
            <textarea id="chat-input" placeholder="Type here..."></textarea>
            <button id="chat-send-btn"><i data-lucide="send"></i></button>
        </div>
    </div>

    <script>
        window.FIXER_DATA = {{ FIXER_DATA|tojson|safe }};
        window.REPERAGE_ID = {{ REPERAGE_ID|tojson|safe }};
        lucide.createIcons();

        // 1. CHAT LOGIC
        const chatPanel = document.getElementById('chat-panel');
        document.getElementById('chat-toggle-btn').onclick = () => chatPanel.classList.add('active');
        document.getElementById('chat-close-btn').onclick = () => chatPanel.classList.remove('active');

        // 2. PROGRESS LOGIC
        function updateProgress() {
            const all = document.querySelectorAll('.scouting-field:not([readonly])');
            const filled = Array.from(all).filter(f => f.value.trim() !== "");
            const pct = Math.round((filled.length / all.length) * 100);
            document.getElementById('progress-bar').style.width = pct + "%";
            document.getElementById('progress-percentage').innerText = pct + "%";
            document.getElementById('progress-filled').innerText = filled.length;
            document.getElementById('progress-total').innerText = all.length;
        }
        document.querySelectorAll('.scouting-field').forEach(f => f.addEventListener('input', updateProgress));
        window.onload = updateProgress;

        // 3. TABS
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            };
        });

        // 4. SAVE & SUBMIT
        async function saveData(silent = false) {
            const data = {};
            document.querySelectorAll('.scouting-field').forEach(f => data[f.name] = f.value);
            const res = await fetch(`/api/reperages/${window.REPERAGE_ID}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok && !silent) {
                const t = document.getElementById('toast');
                t.style.display = 'block';
                setTimeout(() => t.style.display = 'none', 3000);
            }
        }
        document.getElementById('btn-save').onclick = () => saveData();
        document.getElementById('btn-submit').onclick = async () => {
            if(confirm("Submit to production?")) {
                await saveData(true);
                const res = await fetch(`/api/reperages/${window.REPERAGE_ID}/submit`, {method: 'POST'});
                if(res.ok) { window.location.reload(); }
            }
        };
    </script>
</body>
</html>
