<!-- DOC-OS VERSION : V.68 SUPRÊME MISSION CONTROL -->
<!-- INDEX HTML - INTEGRAL CHAT RE-DESIGN -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOC-OS | Scouting Grid</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #2C3E50; --secondary: #E67E22; --lock: #e74c3c; --glass: rgba(255, 255, 255, 0.9); }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f3f4f6; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px; }

        /* CHAT PANEL HARMONIZED (500px) */
        .chat-panel { 
            position: fixed; right: -520px; top: 0; width: 500px; height: 100vh; 
            background: var(--glass); backdrop-filter: blur(25px); 
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); z-index: 9999; 
            box-shadow: -20px 0 50px rgba(0,0,0,0.1); display: flex; flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.4);
        }
        .chat-panel.active { right: 0; }
        .chat-header { background: var(--primary); color: white; padding: 30px; display: flex; justify-content: space-between; align-items: center; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }

        /* BUBBLES PASTEL & ALIGNMENT */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; }
        .msg-me { align-self: flex-end; align-items: flex-end; }
        .msg-them { align-self: flex-start; align-items: flex-start; }
        
        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 0.95rem; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .msg-me .bubble { background: #EBF5FB; color: #2C3E50; border-bottom-right-radius: 4px; } /* Blue Pastel */
        .msg-them .bubble { background: #FDF2E9; color: #2C3E50; border-bottom-left-radius: 4px; } /* Orange Pastel */
        
        .msg-meta { font-size: 0.75rem; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .color-fixer { color: var(--secondary); }
        .color-production { color: var(--primary); }
        
        .msg-time { font-size: 0.65rem; opacity: 0.5; margin-top: 5px; text-align: right; font-weight: 800; }
        
        .day-separator { text-align: center; margin: 20px 0; border-bottom: 1px solid rgba(0,0,0,0.05); line-height: 0.1em; }
        .day-separator span { background: #f3f4f6; padding: 0 15px; color: #95a5a6; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }

        /* INPUT AREA */
        .chat-input-zone { padding: 30px; background: rgba(255,255,255,0.5); border-top: 2px solid rgba(0,0,0,0.05); display: flex; gap: 15px; }
        #chat-input { flex: 1; border: 2px solid #eef2f7; border-radius: 15px; padding: 15px; height: 100px; font-family: inherit; font-weight: 600; resize: none; background: white; outline: none; }
        #chat-send-btn { background: var(--secondary); color: white; border: none; border-radius: 15px; width: 60px; cursor: pointer; transition: 0.3s; }
        #chat-send-btn:hover { background: var(--primary); transform: scale(1.05); }

        .chat-toggle-btn { position: fixed; right: 30px; bottom: 30px; width: 75px; height: 75px; border-radius: 50%; background: var(--secondary); color: white; border: none; cursor: pointer; z-index: 9998; box-shadow: 0 10px 30px rgba(230,126,34,0.4); display: flex; align-items: center; justify-content: center; }

        /* [REST OF PREVIOUS STYLES MAINTAINED] */
        .tab-btn { background: transparent; border: none; padding: 20px 35px; cursor: pointer; font-weight: 800; color: #7f8c8d; }
        .tab-btn.active { background: white; color: var(--secondary); border-bottom: 5px solid var(--secondary); }
        .tab-content { display: none; background: white; padding: 60px; border-radius: 0 25px 25px 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; }
        .fields-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 45px; }
        textarea { grid-column: 1 / -1; width: 100% !important; }
    </style>
</head>
<body>
    <div id="lock-banner">⚠️ DATA LOCKED - SUBMITTED TO PRODUCTION</div>
    <div id="toast">YOUR FORM HAS BEEN SAVED</div>

    <header class="header-fixer-banner" style="background-image: url('{{ FIXER_DATA.image_region or '' }}');">
        <div class="header-fixer-overlay">
            <h1 style="font-size: 5rem; color: white; margin: 0; font-weight: 900;">{{ FIXER_DATA.region }}</h1>
            <div style="color: var(--secondary); font-weight: 900; letter-spacing: 8px;">LOCATION SCOUTING GRID</div>
        </div>
    </header>

    <div class="container">
        <!-- [LOGIQUE PROGRESS ET TABS IDENTIQUE V.67.3 MAIS SANS FOND NOIR] -->
        <div class="progress-container">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:900; font-size:1.8rem;">PROGRESS</span>
                <span id="progress-percentage" style="font-weight:900; color:var(--secondary); font-size:1.8rem;">0%</span>
            </div>
            <div style="background: #edf2f7; height: 15px; border-radius: 10px; overflow: hidden; margin: 15px 0;"><div id="progress-bar" style="height: 100%; background: var(--secondary); width: 0%; transition: 0.6s;"></div></div>
        </div>

        <nav class="tabs-nav">
            <button class="tab-btn active" data-tab="t1">1. TERRITORY</button>
            <button class="tab-btn" data-tab="p1">2. GUARDIAN / LOCATION</button>
            <button class="tab-btn" data-tab="p2">3. GUARDIAN / LOCATION</button>
            <button class="tab-btn" data-tab="p3">4. GUARDIAN / LOCATION</button>
            <button class="tab-btn" data-tab="f1">5. FESTIVITY</button>
        </nav>

        <div class="tabs-container">
            <div class="tab-content active" id="t1">
                <div class="fields-grid">
                    <div class="field-group"><label>Country*</label><input type="text" name="pays" required></div>
                    <div class="field-group"><label>Region / Province*</label><input type="text" name="region" required></div>
                    <div class="field-group"><label>Target Cities (List)*</label><input type="text" name="villes" required></div>
                    <div class="field-group" style="grid-column: span 2;"><label>History & Regional Context</label><textarea name="histoire" rows="5"></textarea></div>
                    <div class="field-group"><label>Planned Date / Climate</label><input type="text" name="climat"></div>
                    <div class="field-group"><label>Logistical Access*</label><textarea name="acces" rows="3" required></textarea></div>
                    <div class="field-group"><label>Crew Accommodation*</label><textarea name="hebergement" rows="3" required></textarea></div>
                </div>
            </div>
            <!-- [BOUCLE PAIRS V.67.3 RECOPIÉE ICI] -->
            {% for i in [1, 2, 3] %}
            <div class="tab-content" id="p{{i}}">
                 <div class="fields-grid">
                    <div class="field-group"><label>Guardian Full Name*</label><input type="text" name="gardien{{i}}_nom_prenom" required></div>
                    <div class="field-group"><label>Age*</label><input type="number" name="gardien{{i}}_age" required></div>
                    <div class="field-group"><label>Role*</label><input type="text" name="gardien{{i}}_fonction" required></div>
                    <div class="field-group"><label>Location Name*</label><input type="text" name="lieu{{i}}_nom" required></div>
                    <div class="field-group"><label>GPS Lat*</label><input type="text" name="lieu{{i}}_gps_lat" required></div>
                    <div class="field-group"><label>GPS Long*</label><input type="text" name="lieu{{i}}_gps_long" required></div>
                    <textarea name="lieu{{i}}_description" rows="4" placeholder="Visual Description*"></textarea>
                 </div>
            </div>
            {% endfor %}
        </div>
        
        <div style="display:flex; gap:20px; justify-content:flex-end; margin-top:40px; margin-bottom:100px;">
            <button id="btn-save" style="background:var(--primary); color:white; padding:20px 60px; border-radius:15px; font-weight:900; border:none; cursor:pointer;">💾 SAVE DRAFT</button>
            <button id="btn-submit" style="background:#27ae60; color:white; padding:20px 60px; border-radius:15px; font-weight:900; border:none; cursor:pointer;">🚀 SUBMIT TO PRODUCTION</button>
        </div>
    </div>

    <!-- HARMONIZED CHAT UI -->
    <button id="chat-toggle-btn" class="chat-toggle-btn"><i data-lucide="message-circle" style="width:40px; height:40px;"></i></button>
    <div id="chat-panel" class="chat-panel">
        <div class="chat-header">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:12px; height:12px; background:#2ecc71; border-radius:50%; box-shadow:0 0 10px #2ecc71;"></div>
                <h3 style="font-weight:900; margin:0; font-size:1.3rem;">INSTANT MESSAGING</h3>
            </div>
            <button id="chat-close-btn" style="background:none; border:none; color:white; font-size:2.5rem; cursor:pointer;">&times;</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div class="chat-input-zone">
            <textarea id="chat-input" placeholder="Type your message here..."></textarea>
            <button id="chat-send-btn"><i data-lucide="send" style="width:25px;"></i></button>
        </div>
    </div>

    <script>window.FIXER_DATA={{FIXER_DATA|tojson|safe}}; window.REPERAGE_ID={{REPERAGE_ID|tojson|safe}};</script>
    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
