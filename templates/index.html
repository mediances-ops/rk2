<!-- DOC-OS VERSION : V.75.1 SUPRÊME MISSION CONTROL -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOC-OS | Scouting Grid</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #2C3E50; --secondary: #E67E22; --lock: #e74c3c; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px; }
        #lock-banner { display: none; position: sticky; top: 0; background: var(--lock); color: white; text-align: center; padding: 15px; font-weight: 900; z-index: 10000; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #27ae60; color: white; padding: 15px 40px; border-radius: 50px; font-weight: 800; z-index: 11000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .header-banner { height: 450px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .tab-btn { background: transparent; border: none; padding: 20px 35px; cursor: pointer; font-weight: 800; color: #7f8c8d; }
        .tab-btn.active { border-bottom: 4px solid var(--secondary); color: var(--secondary); }
        .tab-content { display: none; background: white; padding: 60px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        .fields-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 45px; }
        .field-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .field-group label { font-weight: 800; font-size: 0.85rem; color: #95a5a6; text-transform: uppercase; margin-bottom: 10px; }
        .field-group input, .field-group textarea { padding: 15px; border: 2px solid #eee; border-radius: 10px; font-weight: 600; }
        textarea { grid-column: 1 / -1; }
        .sub-section { border-left: 8px solid var(--secondary); padding: 40px; background: #fdfdfd; margin-bottom: 50px; border-radius: 0 20px 20px 0; }
    </style>
</head>
<body>
    <div id="toast">YOUR FORM HAS BEEN SAVED</div>
    <header class="header-banner" style="background-image: url('{{ FIXER_DATA.image_region }}');">
        <h1 style="color: white; font-size: 5rem; text-shadow: 0 5px 15px rgba(0,0,0,0.5); margin: 0;">{{ FIXER_DATA.region }}</h1>
        <p style="color: white; font-weight: 800; letter-spacing: 5px; text-transform: uppercase;">{{ FIXER_DATA.fixer_nom }}</p>
    </header>

    <div class="container">
        <div style="background: white; padding: 30px; border-radius: 20px; margin-top: -60px; position: relative; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.1);">
            <div style="display:flex; justify-content:space-between; align-items:center;"><span style="font-weight:900; font-size:1.5rem;">PROGRESS</span><span id="progress-percentage" style="font-weight:900; color:var(--secondary);">0%</span></div>
            <div style="background: #edf2f7; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 15px;"><div id="progress-bar" style="height: 100%; background: var(--secondary); width: 0%; transition: 0.6s;"></div></div>
        </div>

        <nav class="tabs-nav" style="display: flex; gap: 10px; margin-bottom: -1px;">
            <button class="tab-btn active" data-tab="tab-territory">1. TERRITORY</button>
            <button class="tab-btn" data-tab="tab-pair1">2. GUARDIAN / LOCATION N°1</button>
            <button class="tab-btn" data-tab="tab-pair2">3. GUARDIAN / LOCATION N°2</button>
            <button class="tab-btn" data-tab="tab-pair3">4. GUARDIAN / LOCATION N°3</button>
            <button class="tab-btn" data-tab="tab-festivity">5. FESTIVITY</button>
        </nav>

        <div class="tabs-container">
            <div class="tab-content active" id="tab-territory">
                <div class="fields-grid">
                    <div class="field-group"><label>Country</label><input type="text" name="pays" class="scouting-field" readonly></div>
                    <div class="field-group"><label>Region</label><input type="text" name="region" class="scouting-field" readonly></div>
                    <div class="field-group"><label>Target Cities*</label><input type="text" name="villes" class="scouting-field" required></div>
                    <textarea name="traditions" class="scouting-field" rows="6" placeholder="Traditions & Culture"></textarea>
                    <textarea name="histoire" class="scouting-field" rows="6" placeholder="History"></textarea>
                    <textarea name="notes" class="scouting-field" rows="3" placeholder="General Production Notes"></textarea>
                </div>
            </div>
            {% for i in [1, 2, 3] %}
            <div class="tab-content" id="tab-pair{{i}}">
                <div class="sub-section">
                    <h3 style="font-weight:900; margin-bottom:25px;">The Guardian n°{{i}}</h3>
                    <div class="fields-grid">
                        <input type="text" name="gardien{{i}}_nom_prenom" class="scouting-field" placeholder="Full Name*">
                        <input type="number" name="gardien{{i}}_age" class="scouting-field" placeholder="Age*">
                        <textarea name="gardien{{i}}_histoire" class="scouting-field" rows="3" placeholder="Background*"></textarea>
                    </div>
                </div>
                <div class="sub-section" style="border-left-color: var(--primary);">
                    <h3 style="font-weight:900; margin-bottom:25px;">The Location n°{{i}}</h3>
                    <div class="fields-grid">
                        <input type="text" name="lieu{{i}}_nom" class="scouting-field" placeholder="Place Name*">
                        <textarea name="lieu{{i}}_description" class="scouting-field" rows="4" placeholder="Visual Description*"></textarea>
                    </div>
                </div>
            </div>
            {% endfor %}
            <div class="tab-content" id="tab-festivity">
                <div class="fields-grid">
                    <input type="text" name="fete_nom" class="scouting-field" placeholder="Festival Name*">
                    <textarea name="fete_visuel" class="scouting-field" rows="5" placeholder="Visual Substance"></textarea>
                </div>
            </div>
        </div>

        <div style="display:flex; gap:25px; justify-content:flex-end; margin-top:40px; margin-bottom:100px;">
            <button id="btn-save" style="background:var(--primary); color:white; padding:25px 70px; border-radius:18px; font-weight:900; border:none; cursor:pointer;">💾 SAVE DRAFT</button>
            <button id="btn-submit" style="background:#27ae60; color:white; padding:25px 70px; border-radius:18px; font-weight:900; border:none; cursor:pointer;">🚀 SUBMIT TO PRODUCTION</button>
        </div>
    </div>

    <button id="chat-toggle-btn" style="position: fixed; bottom: 30px; right: 30px; width: 75px; height: 75px; border-radius: 50%; background: var(--secondary); color: white; border: none; cursor: pointer;"><i data-lucide="message-circle"></i></button>
    <div id="chat-panel" style="position: fixed; right: -500px; top: 0; width: 500px; height: 100vh; background: var(--glass); backdrop-filter: blur(15px); transition: 0.5s;"><div id="chat-messages" style="height: 80%; overflow-y: auto; padding: 25px;"></div></div>
    <script>window.FIXER_DATA={{FIXER_DATA|tojson|safe}}; window.REPERAGE_ID={{REPERAGE_ID|tojson|safe}};</script>
    <script src="/static/js/app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
