<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Correspondants | Pre-scouting</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #2C3E50 0%, #34495e 100%); border-radius: 16px; padding: 40px; color: white; display: flex; align-items: center; gap: 30px; margin-bottom: 20px; }
        .nav { display: flex; gap: 15px; margin-bottom: 20px; }
        .nav-link { background: white; color: #2C3E50; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }
        .filter-bar { background: white; border-radius: 12px; padding: 15px; display: flex; gap: 10px; margin-bottom: 20px; }
        table { width: 100%; background: white; border-radius: 12px; border-collapse: collapse; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .btn-small { padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 0.8rem; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://destinationsetcuisines.com/doc/logoRK.png" alt="Logo" style="height:60px;">
            <h1>Correspondants Internationaux</h1>
        </div>

        <div class="nav">
            <a href="/admin" class="nav-link"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            <a href="/admin/fixer/new" class="nav-link" style="background:#E67E22; color:white;"><i data-lucide="plus"></i> Nouveau Fixer</a>
            <!-- FIX 5 : Bouton déconnexion supprimé -->
        </div>

        <!-- FIX 10 : Filtres actifs -->
        <form class="filter-bar" method="GET" action="/admin/fixers">
            <input type="text" name="search" placeholder="Nom ou Société" style="flex:1; padding:10px; border-radius:8px; border:1px solid #ddd;">
            <button type="submit" style="padding:10px 20px; background:#2C3E50; color:white; border:none; border-radius:8px; cursor:pointer;">Filtrer</button>
        </form>

        <table>
            <thead><tr><th>Nom</th><th>Société</th><th>Pays</th><th>Actions</th></tr></thead>
            <tbody>
                {% for f in fixers %}
                <tr>
                    <td><strong>{{ f.nom }} {{ f.prenom }}</strong></td>
                    <td>{{ f.societe }}</td>
                    <td>{{ f.pays }}</td>
                    <td>
                        <a href="/admin/fixer/{{ f.id }}" class="btn-small" style="background:#2C3E50;">Voir</a> <!-- FIX 6 : Route corrigée -->
                        <a href="/admin/fixer/{{ f.id }}/edit" class="btn-small" style="background:#3498db;">Modif</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
