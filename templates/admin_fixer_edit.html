<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% if fixer %}Modifier{% else %}Nouveau{% endif %} Fixer | Pre-scouting</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f3f4f6; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #2C3E50; color: white; padding: 30px 40px; }
        .form-body { padding: 40px; }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 30px; }
        .tab-btn { padding: 15px 25px; border: none; background: none; cursor: pointer; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { color: #E67E22; border-bottom: 3px solid #E67E22; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 8px; color: #34495e; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-family: inherit; }
        .btn-save { background: #E67E22; color: white; padding: 15px 40px; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>{% if fixer %}MODIFIER PROFIL : {{ fixer.nom }}{% else %}CRÉER UN CORRESPONDANT{% endif %}</h2>
        </div>
        <form method="POST" class="form-body">
            <div class="tabs">
                <button type="button" class="tab-btn active" data-tab="id">IDENTITÉ</button>
                <button type="button" class="tab-btn" data-tab="pro">PROFESSIONNEL</button>
                <button type="button" class="tab-btn" data-tab="admin">ADMINISTRATION</button>
            </div>

            <!-- 1. IDENTITÉ -->
            <div class="tab-content active" id="id">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="form-group"><label>Nom</label><input type="text" name="nom" value="{{ fixer.nom or '' }}" required></div>
                    <div class="form-group"><label>Prénom</label><input type="text" name="prenom" value="{{ fixer.prenom or '' }}" required></div>
                </div>
                <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ fixer.email or '' }}" required></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="form-group"><label>Téléphone 1</label><input type="tel" name="telephone" value="{{ fixer.telephone or '' }}"></div>
                    <div class="form-group"><label>Téléphone 2</label><input type="tel" name="telephone_2" value="{{ fixer.telephone_2 or '' }}"></div>
                </div>
                <div class="form-group"><label>Adresse Complète</label><textarea name="adresse_1">{{ fixer.adresse_1 or '' }}</textarea></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                    <div class="form-group"><label>Ville</label><input type="text" name="ville" value="{{ fixer.ville or '' }}"></div>
                    <div class="form-group"><label>Pays</label><input type="text" name="pays" value="{{ fixer.pays or '' }}"></div>
                </div>
            </div>

            <!-- 2. PROFESSIONNEL -->
            <div class="tab-content" id="pro">
                <div class="form-group"><label>Société / Agence</label><input type="text" name="societe" value="{{ fixer.societe or '' }}"></div>
                <div class="form-group"><label>Fonction</label><input type="text" name="fonction" value="{{ fixer.fonction or '' }}"></div>
                <div class="form-group"><label>N° SIRET</label><input type="text" name="numero_siret" value="{{ fixer.numero_siret or '' }}"></div>
                <div class="form-group"><label>Biographie</label><textarea name="bio" rows="4">{{ fixer.bio or '' }}</textarea></div>
                <div class="form-group"><label>Spécialités</label><textarea name="specialites" rows="3">{{ fixer.specialites or '' }}</textarea></div>
            </div>

            <!-- 3. ADMINISTRATION -->
            <div class="tab-content" id="admin">
                <div class="form-group"><label>URL Photo Profil</label><input type="url" name="photo_profil_url" value="{{ fixer.photo_profil_url or '' }}"></div>
                <div class="form-group"><label>Langue Interface</label><select name="langue_preferee"><option value="FR" {% if fixer.langue_preferee == 'FR' %}selected{% endif %}>FRANÇAIS</option><option value="GB" {% if fixer.langue_preferee == 'GB' %}selected{% endif %}>ENGLISH</option></select></div>
                <div class="form-group"><label>Notes Internes (Privé)</label><textarea name="notes_internes" rows="5">{{ fixer.notes_internes or '' }}</textarea></div>
                <div class="form-group"><label><input type="checkbox" name="actif" {% if fixer.actif %}checked{% endif %}> Correspondant Actif</label></div>
            </div>

            <button type="submit" class="btn-save">ENREGISTRER LE PROFIL</button>
        </form>
    </div>
    <script>
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));
                btn.classList.add('active'); document.getElementById(btn.dataset.tab).classList.add('active');
            };
        });
    </script>
</body>
</html>
